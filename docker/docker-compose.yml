version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: techlingua-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: techlingua-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  flask:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: techlingua-flask
    ports:
      - "5001:5001"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - HF_HOME=/app/models_cache
      - TRANSFORMERS_CACHE=/app/models_cache
    volumes:
      - models_cache:/app/models_cache
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  neo4j_data:
  qdrant_data:
  models_cache:
